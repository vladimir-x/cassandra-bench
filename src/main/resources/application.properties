spring.application.name=cass.check

spring.cassandra.keyspace-name=store
#spring.cassandra.contact-points=192.168.6.181:9042
spring.cassandra.contact-points=127.0.0.1:9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.request.timeout=10s

datastax-java-driver.advanced.connection.pool.local.size=4
datastax-java-driver.advanced.connection.max-requests-per-connection=1024

# настройка для сциллы
#spring.cassandra.config.datastax-java-driver.basic.load-balancing-policy.class=com.scylladb.driver.internal.core.loadbalancing.ScyllaLoadBalancingPolicy

##пути до JAVA
casstool.java11.home=/opt/openjdk-11.0.2
casstool.java17.home=/opt/liberica-17.0.7

# Настройки запуска кассандры перед запуском тестирования
## Скрипты иницализации KEYSAPCE
casstool.cass4.create-keyspace-script=src/scripts/scripts_cass4.cql
casstool.cass5.create-keyspace-script=src/scripts/scripts_cass5.cql
casstool.scylla.create-keyspace-script=src/scripts/scripts_scylla.cql

## Скрипт запуска сциллы
casstool.scylla.run-as-daemon-script=src/scripts/scylla_run_as_daemon.sh

##Пути до директории установки кассандры
casstool.cassandra4.path=/opt/apache-cassandra-4.1.10
casstool.cassandra5.path=/opt/apache-cassandra-5.0.5
casstool.scylla.path=/opt/scylladb

##Пути до директории хранения файлов с данными
casstool.cassandra4.data.path=/opt/apache-cassandra-4.1.10/data/data
casstool.cass5.data.path=/opt/apache-cassandra-5.0.5/data/data
casstool.scylla.data.path=/home/dude/scylla-work/data


##Пути до директории с утилитами для сревисных операций
casstool.scylla.cqlsh.path=/opt/scylladb/share/cassandra/bin/cqlsh
casstool.scylla.nodetool.path=/opt/scylladb/bin/nodetool
casstool.scylla.nodetool.port=10000

#специальный путь для запуска питона, нужной для cqlsh версии
casstool.pythonBinPath=/home/dude/.pyenv/versions/3.11.13/bin/python


##Выбор тестируемой версии кассандры
#casstool.cassandra.enable-version=CASS_4
casstool.cassandra.enable-version=CASS_5
#casstool.cassandra.enable-version=SCYLLA

##Выбор JAVA
casstool.java.version=java11
#casstool.java.version=java17

##Выбор GC и XMX
#Для сциллы нужно настраивать по количеству доступных ядер - шардов
casstool.java.xmx=-Xmx2g
casstool.java.xms=-Xms2g
casstool.java.gc=G1
#casstool.java.gc=CMS
#casstool.java.gc=ZGC

#CPU трекер, для отслеживания загрузки ЦП и памяти
casstool.tracker.url=http://localhost:8081


#автосоздание keyspace
casstool.create-keyspace.enable=true
# авто-запуск и авто-остановке кассандны
casstool.start.enable=true
casstool.force-restart.enable=false
casstool.stop.enable=false

#Настройки тестирования: многопоточка и логи
# На Remote максимальаня производительность нап 512 - потоках
speedtest.multithreads.threads.count=128
speedtest.executing.stat.enabled=true
speedtest.executing.stat.delay=3s


#скорость работы с партиционным ключём
speedtest.benches.set1.enabled=true
speedtest.benches.set1.name=many_small_partitions
speedtest.benches.set1.title=Test many small partitions
speedtest.benches.set1.insert-count=5_000_000
speedtest.benches.set1.select-time-sec=60
#speedtest.benches.set1.flush-after-insert=true
#speedtest.benches.set1.compact-after-insert=false
##speedtest.benches.set1.retry=1
##speedtest.benches.set1.retry-select=2

##скорость работы с кластерным ключём
speedtest.benches.set2.enabled=true
speedtest.benches.set2.name=one_big_partition
speedtest.benches.set2.title=Test big partition with search by cluster key
speedtest.benches.set2.insert-count=5_000_000
speedtest.benches.set2.select-time-sec=60
#speedtest.benches.set2.retry=3
#
##поиск через промежуточную табличку поиска
speedtest.benches.set3.enabled=true
speedtest.benches.set3.name=find_by_searchtable
speedtest.benches.set3.title=Test search by custom searchtable
speedtest.benches.set3.insert-count=5_000_000
speedtest.benches.set3.select-time-sec=60
#speedtest.benches.set3.retry=3
#
#поиск через обычный индекс
speedtest.benches.set4.enabled=true
speedtest.benches.set4.name=find_by_secondary_index
speedtest.benches.set4.title=Test search by Regular Secondary Index (2i)
speedtest.benches.set4.insert-count=5_000_000
speedtest.benches.set4.select-time-sec=60
#speedtest.benches.set4.retry=1
#speedtest.benches.set4.select-time-sec=5
#
##поиск через SAI
speedtest.benches.set5.enabled=true
speedtest.benches.set5.name=find_by_sai
speedtest.benches.set5.title=Test search by SAI
speedtest.benches.set5.insert-count=5_000_000
speedtest.benches.set5.select-time-sec=60
#speedtest.benches.set5.retry=1
#
##Векторый по SAI vector(128)
speedtest.benches.set6.enabled=false
speedtest.benches.set6.name=find_by_sai_vector
speedtest.benches.set6.title=Test search by SAI Vector(128)
#speedtest.benches.set6.insert-count=100_000,200_000,500_000,1_000_000,2_000_000
speedtest.benches.set6.insert-count=10_000
#speedtest.benches.set6.retry=1
#
##производительность LWT под сильной конкурентностью
speedtest.benches.set7.enabled=true
speedtest.benches.set7.name=lwt_bench
speedtest.benches.set7.title=Test LWT with strong concurrency
speedtest.benches.set7.tag=lwt_1_part
speedtest.benches.set7.options.used_partitions=1
speedtest.benches.set7.insert-count=10_000
#speedtest.benches.set7.retry=1
speedtest.benches.set7.retry-select=0
#
##производительность LWT под слабой конкурентностью
speedtest.benches.set8.enabled=true
speedtest.benches.set8.name=lwt_bench
speedtest.benches.set8.title=Test LWT with weak concurency
speedtest.benches.set8.tag=lwt_100000_part
speedtest.benches.set8.options.used_partitions=100_000
speedtest.benches.set8.insert-count=500_000
#speedtest.benches.set8.retry=1
speedtest.benches.set8.retry-select=0

